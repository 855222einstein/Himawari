services:
  - type: worker
    name: himawari-bot
    runtime: docker
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        sync: false
      - key: OWNER_ID
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: LOG_CHAT_ID
        sync: false
      - key: SUDO_USERS
        sync: false
      - key: START_IMAGE
        sync: false
      - key: SUPPORT_GROUP
        sync: false
      - key: UPDATE_CHANNEL
        sync: false
